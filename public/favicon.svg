<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#311042"/>
    </linearGradient>
    <linearGradient id="bookLeftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bookRightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="aiGlowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  <rect width="504" height="504" x="4" y="4" rx="124" stroke="#ffffff" stroke-opacity="0.15" stroke-width="8"/>

  <!-- Subtle glow aura -->
  <circle cx="256" cy="270" r="140" fill="url(#aiGlowGrad)" opacity="0.2" filter="url(#glow)"/>

  <!-- Open Book Pages (Dynamic Curvature) -->
  <path d="M120 350 V 210 C 120 190 140 178 165 182 L 244 195 V 338 L 165 324 C 140 320 120 332 120 350 Z" fill="url(#bookLeftGrad)"/>
  <path d="M392 350 V 210 C 392 190 372 178 347 182 L 268 195 V 338 L 347 324 C 372 320 392 332 392 350 Z" fill="url(#bookRightGrad)"/>

  <!-- Inner Page Lines accent -->
  <path d="M150 220 L220 230" stroke="#ffffff" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>
  <path d="M150 245 L210 254" stroke="#ffffff" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>
  <path d="M362 220 L292 230" stroke="#ffffff" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>
  <path d="M362 245 L302 254" stroke="#ffffff" stroke-opacity="0.3" stroke-width="4" stroke-linecap="round"/>

  <!-- Center Spine -->
  <path d="M256 195 V 338" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>

  <!-- AI Sparkle (Top / Center floating) -->
  <g filter="url(#glow)">
    <path d="M256 100 Q256 150 210 150 Q256 150 256 200 Q256 150 302 150 Q256 150 256 100 Z" fill="url(#aiGlowGrad)"/>
    <circle cx="256" cy="150" r="7" fill="#ffffff"/>
  </g>

  <!-- Secondary Sparkles -->
  <path d="M360 120 Q360 135 345 135 Q360 135 360 150 Q360 135 375 135 Q360 135 360 120 Z" fill="#38bdf8" opacity="0.85"/>
  <path d="M150 140 Q150 150 140 150 Q150 150 150 160 Q150 150 160 150 Q150 150 150 140 Z" fill="#c084fc" opacity="0.75"/>
</svg>
